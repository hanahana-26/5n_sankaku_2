<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角形の内角の和シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            touch-action: none;
            overflow: hidden;
            font-family: 'sans-serif';
        }
        canvas {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            cursor: crosshair;
        }
        .control-panel {
            user-select: none;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">
    <div class="max-w-4xl w-full flex flex-col gap-4">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-slate-800">三角形の内角の和（回転・手動操作）</h1>
            <p class="text-slate-600 text-sm">角を切り取ったあと、白いハンドルをドラッグして向きを変えられます。</p>
        </div>

        <div class="relative flex justify-center">
            <canvas id="canvas" width="800" height="500" class="w-full h-auto border border-slate-200"></canvas>
            
            <div id="hint-msg" class="absolute bottom-4 left-4 bg-white/90 px-3 py-2 rounded-lg text-sm text-slate-600 shadow-sm border border-slate-100 pointer-events-none transition-opacity duration-300">
                モード：三角形の作成
            </div>
        </div>

        <div class="control-panel flex flex-wrap justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-md border border-slate-200">
            <div class="flex items-center gap-2">
                <button id="cut-btn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-lg transition-all shadow-md active:scale-95">
                    角を切り取る
                </button>
                <button id="reset-btn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-6 rounded-lg transition-all active:scale-95">
                    リセット
                </button>
            </div>
            
            <div class="flex gap-4 items-center font-mono text-lg bg-slate-50 px-4 py-2 rounded-lg border border-slate-100">
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-400">角A</span>
                    <span id="angle-a" class="text-red-500 font-bold">-</span>
                </div>
                <span class="text-slate-300">+</span>
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-400">角B</span>
                    <span id="angle-b" class="text-green-600 font-bold">-</span>
                </div>
                <span class="text-slate-300">+</span>
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-400">角C</span>
                    <span id="angle-c" class="text-blue-500 font-bold">-</span>
                </div>
                <span class="text-slate-300">=</span>
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-400">合計</span>
                    <span class="font-black text-slate-800">180°</span>
                </div>
            </div>
        </div>

        <div class="text-xs text-slate-400 text-center">
            ※角を掴んで移動、白いハンドルを掴んで回転できます。
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cutBtn = document.getElementById('cut-btn');
        const resetBtn = document.getElementById('reset-btn');
        const hintMsg = document.getElementById('hint-msg');
        
        const angleDisplays = {
            a: document.getElementById('angle-a'),
            b: document.getElementById('angle-b'),
            c: document.getElementById('angle-c')
        };

        // アプリの状態
        let mode = 'edit'; 
        let points = [
            { x: 400, y: 100, color: '#ef4444', label: 'A', id: 0 },
            { x: 200, y: 350, color: '#22c55e', label: 'B', id: 1 },
            { x: 600, y: 350, color: '#3b82f6', label: 'C', id: 2 }
        ];

        let pieces = [];
        let draggingItem = null; 
        let rotatingItem = null;
        let dragOffset = { x: 0, y: 0 };

        // 設定
        const RADIUS = 80;
        const HANDLE_RADIUS = 12;
        const GROUND_Y = 420;

        function init() {
            canvas.addEventListener('mousedown', onDown);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            
            canvas.addEventListener('touchstart', (e) => onDown(e.touches[0]));
            window.addEventListener('touchmove', (e) => onMove(e.touches[0]));
            window.addEventListener('touchend', onUp);

            cutBtn.addEventListener('click', toggleMode);
            resetBtn.addEventListener('click', resetAll);

            requestAnimationFrame(draw);
        }

        function toggleMode() {
            if (mode === 'edit') {
                createPieces();
                mode = 'play';
                cutBtn.innerText = '作り直す';
                hintMsg.innerText = 'モード：自由に並べてみよう';
            } else {
                mode = 'edit';
                cutBtn.innerText = '角を切り取る';
                hintMsg.innerText = 'モード：三角形の作成';
                pieces = [];
            }
        }

        function resetAll() {
            mode = 'edit';
            points = [
                { x: 400, y: 100, color: '#ef4444', label: 'A', id: 0 },
                { x: 200, y: 350, color: '#22c55e', label: 'B', id: 1 },
                { x: 600, y: 350, color: '#3b82f6', label: 'C', id: 2 }
            ];
            pieces = [];
            cutBtn.innerText = '角を切り取る';
            hintMsg.innerText = 'モード：三角形の作成';
        }

        function createPieces() {
            const angles = calculateAngleInfo();
            pieces = angles.map((info, i) => ({
                id: i,
                x: points[i].x,
                y: points[i].y,
                angleSize: info.size,
                rotation: info.start, // 初期の回転状態
                color: points[i].color,
                label: points[i].label
            }));
        }

        function calculateAngleInfo() {
            const getAngleAt = (p, pNext, pPrev) => {
                const aNext = Math.atan2(pNext.y - p.y, pNext.x - p.x);
                const aPrev = Math.atan2(pPrev.y - p.y, pPrev.x - p.x);
                let diff = aPrev - aNext;
                while (diff < 0) diff += Math.PI * 2;
                if (diff > Math.PI) diff -= Math.PI * 2;
                
                let start = aNext;
                if (diff < 0) {
                    start = aPrev;
                    diff = -diff;
                }
                return { start, size: diff };
            };

            return [
                getAngleAt(points[0], points[1], points[2]),
                getAngleAt(points[1], points[2], points[0]),
                getAngleAt(points[2], points[0], points[1])
            ];
        }

        function onDown(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (mode === 'edit') {
                for (const p of points) {
                    if (Math.hypot(p.x - x, p.y - y) < 25) {
                        draggingItem = p;
                        dragOffset = { x: p.x - x, y: p.y - y };
                        return;
                    }
                }
            } else {
                // プレイモード：回転ハンドルか移動か
                for (let i = pieces.length - 1; i >= 0; i--) {
                    const p = pieces[i];
                    
                    // 回転ハンドルの位置を計算（扇形の中心角付近）
                    const handleAngle = p.rotation + p.angleSize / 2;
                    const hx = p.x + Math.cos(handleAngle) * (RADIUS + 15);
                    const hy = p.y + Math.sin(handleAngle) * (RADIUS + 15);

                    if (Math.hypot(hx - x, hy - y) < 25) {
                        rotatingItem = p;
                        // 掴んだものを最前面へ
                        pieces.splice(i, 1);
                        pieces.push(p);
                        return;
                    }

                    if (Math.hypot(p.x - x, p.y - y) < RADIUS) {
                        draggingItem = p;
                        dragOffset = { x: p.x - x, y: p.y - y };
                        pieces.splice(i, 1);
                        pieces.push(p);
                        return;
                    }
                }
            }
        }

        function onMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (draggingItem) {
                draggingItem.x = x + dragOffset.x;
                draggingItem.y = y + dragOffset.y;

                // 地面スナップ
                if (mode === 'play' && Math.abs(draggingItem.y - GROUND_Y) < 20) {
                    draggingItem.y = GROUND_Y;
                }
            }

            if (rotatingItem) {
                // 中心点からのマウス角度を計算
                const angle = Math.atan2(y - rotatingItem.y, x - rotatingItem.x);
                // 扇形の開始位置を調整（ハンドルの位置が中央にくるように）
                rotatingItem.rotation = angle - rotatingItem.angleSize / 2;

                // 水平スナップ (0度, 180度付近)
                const rotDeg = (rotatingItem.rotation * 180 / Math.PI) % 360;
                if (Math.abs(rotDeg) < 5 || Math.abs(rotDeg - 360) < 5) rotatingItem.rotation = 0;
                if (Math.abs(rotDeg - 180) < 5 || Math.abs(rotDeg + 180) < 5) rotatingItem.rotation = Math.PI;
            }
        }

        function onUp() {
            draggingItem = null;
            rotatingItem = null;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面（直線）
            ctx.beginPath();
            ctx.moveTo(100, GROUND_Y);
            ctx.lineTo(700, GROUND_Y);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 三角形の枠
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.lineTo(points[2].x, points[2].y);
            ctx.closePath();
            ctx.strokeStyle = '#94a3b8';
            ctx.setLineDash(mode === 'edit' ? [] : [5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            if (mode === 'edit') {
                ctx.fillStyle = 'rgba(148, 163, 184, 0.1)';
                ctx.fill();
            }

            const angleInfo = calculateAngleInfo();
            angleDisplays.a.innerText = Math.round(angleInfo[0].size * 180 / Math.PI) + '°';
            angleDisplays.b.innerText = Math.round(angleInfo[1].size * 180 / Math.PI) + '°';
            angleDisplays.c.innerText = Math.round(angleInfo[2].size * 180 / Math.PI) + '°';

            if (mode === 'edit') {
                points.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    ctx.fillStyle = '#1e293b';
                    ctx.font = 'bold 18px sans-serif';
                    ctx.fillText(p.label, p.x - 6, p.y - 20);
                });
                
                angleInfo.forEach((info, i) => {
                    drawSector(points[i].x, points[i].y, info.start, info.size, points[i].color, 0.4);
                });
            } else {
                pieces.forEach(p => {
                    drawPiece(p);
                });
            }

            requestAnimationFrame(draw);
        }

        function drawPiece(p) {
            // 扇形
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, RADIUS, p.rotation, p.rotation + p.angleSize);
            ctx.lineTo(p.x, p.y);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.7;
            ctx.fill();
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3;
            ctx.globalAlpha = 1;
            ctx.stroke();

            // ラベル
            const midAngle = p.rotation + p.angleSize / 2;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText(p.label, p.x + Math.cos(midAngle) * RADIUS * 0.5 - 7, p.y + Math.sin(midAngle) * RADIUS * 0.5 + 7);

            // 回転ハンドル
            const hx = p.x + Math.cos(midAngle) * (RADIUS + 15);
            const hy = p.y + Math.sin(midAngle) * (RADIUS + 15);
            
            ctx.beginPath();
            ctx.arc(hx, hy, HANDLE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 回転アイコン的なもの
            ctx.beginPath();
            ctx.arc(hx, hy, 5, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            ctx.restore();
        }

        function drawSector(x, y, start, size, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.arc(x, y, RADIUS, start, start + size);
            ctx.lineTo(x, y);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.restore();
        }

        window.onload = init;
    </script>
</body>
</html>
